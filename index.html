<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mekasa | Kitchen Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefaf5; color: #2e241d; }
        .app-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .header { background: rgba(255,255,248,0.96); border-radius: 32px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(212,175,55,0.3); box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex-wrap: wrap; gap: 10px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-circle { width: 50px; height: 50px; background: linear-gradient(135deg, #f9e7d2, #f5d5b3); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #d4af37; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #8B5A2B, #c47b2e); background-clip: text; color: transparent; }
        .stats { display: flex; gap: 15px; }
        .stat-card { background: white; border-radius: 30px; padding: 8px 20px; text-align: center; border: 1px solid #e2cfb5; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: #8B5A2B; }
        .stat-label { font-size: 0.75rem; color: #7c6b5a; }
        .controls { display: flex; gap: 12px; }
        .control-btn { width: 42px; height: 42px; border-radius: 50%; background: white; border: 1px solid #e2cfb5; color: #8B5A2B; cursor: pointer; font-size: 1.1rem; }
        .control-btn:hover { background: #8B5A2B; color: white; }
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid #f0e2d2; padding-bottom: 8px; }
        .tab-btn { background: none; border: none; padding: 8px 24px; font-weight: 600; font-size: 1rem; color: #7c6b5a; cursor: pointer; border-radius: 40px; }
        .tab-btn.active { background: #8B5A2B; color: white; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .order-card { background: white; border-radius: 28px; overflow: hidden; border: 1px solid rgba(212,175,55,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .order-header { background: linear-gradient(135deg, #f9e7d2, #f5d5b3); padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #e2cfb5; }
        .order-id { font-weight: 800; color: #8B5A2B; font-family: 'Playfair Display', serif; }
        .order-time { font-size: 0.8rem; color: #7c6b5a; }
        .order-body { padding: 16px; }
        .table-info { background: #fef6ef; border-radius: 20px; padding: 12px; text-align: center; margin-bottom: 16px; border: 1px solid #e7cfb5; font-size: 1.8rem; font-weight: 800; color: #8B5A2B; }
        .order-items { background: #faf6f0; border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2cfb5; font-size: 0.9rem; }
        .order-total { text-align: right; font-weight: 800; font-size: 1.2rem; color: #8B5A2B; margin-top: 12px; padding-top: 12px; border-top: 2px solid #e7cfb5; }
        .order-notes { background: #fff9f0; border-right: 4px solid #d4af37; padding: 10px; border-radius: 16px; margin: 12px 0; font-size: 0.85rem; }
        .order-footer { padding: 16px; display: flex; gap: 12px; border-top: 1px solid #f0e2d2; }
        .action-btn { flex: 1; padding: 10px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .btn-done { background: #8B5A2B; color: white; }
        .btn-done:hover { background: #6f451f; }
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 28px; color: #7c6b5a; }
        .notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #8B5A2B; color: white; padding: 12px 24px; border-radius: 50px; z-index: 3000; font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-circle"><img src="https://iili.io/qiHfvxj.jpg" alt="Logo"></div>
            <div class="logo-text">Mekasa Kitchen</div>
        </div>
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="preparingCount">0</div><div class="stat-label">Preparing</div></div>
            <div class="stat-card"><div class="stat-number" id="completedCount">0</div><div class="stat-label">Completed</div></div>
        </div>
        <div class="controls">
            <button class="control-btn" id="forceBtn" title="Force Show Orders" style="background:#e8f5e9; border-color:#4caf50; color:#2e7d32; font-size:1.2rem; font-weight:bold;">⚡</button>
            <button class="control-btn" id="soundToggle"><i class="fas fa-volume-up"></i></button>
            <button class="control-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-status="preparing"><i class="fas fa-fire"></i> Preparing</button>
        <button class="tab-btn" data-status="completed"><i class="fas fa-check-double"></i> Completed</button>
        <button class="tab-btn" data-status="all" style="background:#fff3e0; color:#e65100;"><i class="fas fa-list"></i> All Orders</button>
    </div>
    
    <div id="ordersContainer" class="orders-grid"></div>
</div>

<script>
    // ⚠️ ضع الرابط الجديد هنا
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNTt4vBxSns2eeWfqhdngOIn10S1I6Hw7uV72x0A6f8LYzIsMMRmh_OuYsLPuoztmm/exec'; // استبدل النقاط برابطك كامل

    let orders = [];
    let currentStatus = 'preparing';

    const ordersContainer = document.getElementById('ordersContainer');

    // دالة العرض القوية (لا تفشل)
    function renderOrders() {
        let filtered = orders;
        
        // إذا اخترت "الكل" اعرض كل شيء، وإلا فلتر حسب الحالة
        if (currentStatus !== 'all') {
            filtered = orders.filter(o => o.status === currentStatus);
        }

        if (filtered.length === 0) {
            ordersContainer.innerHTML = '<div class="empty-state"><h3>No orders in this section</h3><p>Try clicking the ⚡ button or "All Orders" tab</p></div>';
            return;
        }

        let html = '';
        filtered.forEach(function(order) {
            let total = 0;
            let itemsHtml = '';
            let items = order.items;
            
            // شبكة أمان: إذا كانت المنتجات نصاً، حولها لكائن
            if (typeof items === 'string') {
                try { items = JSON.parse(items); } catch(e) { items = []; }
            }
            if (!Array.isArray(items)) items = [];

            items.forEach(function(item) {
                let itemTotal = (item.price || 0) * (item.quantity || 1);
                total += itemTotal;
                itemsHtml += '<div class="order-item"><span>' + (item.name || 'Item') + ' x' + (item.quantity || 1) + '</span><span>' + itemTotal.toFixed(2) + ' JOD</span></div>';
            });

            if (total === 0) total = order.total || 0;

            let typeLabel = (order.tableNumber === 'Delivery') ? '🛵 Delivery' : '🪑 Table ' + (order.tableNumber || '-');
            let statusBadge = (order.status === 'completed') ? '✅ Completed' : '🔥 Preparing';
            
            let notesHtml = order.notes ? '<div class="order-notes"><b>Notes:</b> ' + order.notes + '</div>' : '';
            let actionBtn = (order.status === 'preparing') ? '<button class="action-btn btn-done" onclick="markComplete(\'' + order.orderId + '\')">✔ Mark Ready</button>' : '';

            html += '<div class="order-card">' +
                '<div class="order-header"><span class="order-id">#' + order.orderId.slice(-6) + '</span><span class="order-time">' + new Date(order.timestamp).toLocaleTimeString() + '</span></div>' +
                '<div class="order-body">' +
                    '<div class="table-info">' + typeLabel + '</div>' +
                    '<div class="order-items">' + itemsHtml + '<div class="order-total">Total: ' + total.toFixed(2) + ' JOD</div></div>' +
                    notesHtml +
                    '<div style="margin-top:10px; font-weight:600; color:#8B5A2B;">' + statusBadge + '</div>' +
                '</div>' +
                '<div class="order-footer">' + actionBtn + '</div>' +
            '</div>';
        });

        ordersContainer.innerHTML = html;
        updateCounts();
    }

    function updateCounts() {
        document.getElementById('preparingCount').innerText = orders.filter(o => o.status === 'preparing').length;
        document.getElementById('completedCount').innerText = orders.filter(o => o.status === 'completed').length;
    }

    // ⚡ زر القوة السحرية (يخترق كل المشاكل ويجبر البيانات على الظهور)
    document.getElementById('forceBtn').addEventListener('click', async function() {
        alert('جاري فرض جلب البيانات...');
        try {
            let res = await fetch(SCRIPT_URL + '?action=getOrders&force=' + Date.now());
            let text = await res.text();
            let data = JSON.parse(text);
            
            if (data.success) {
                orders = data.orders; // حقن البيانات بالقوة
                currentStatus = 'all'; // تبديل التبويب للكل لضمان رؤيتها
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-status="all"]').classList.add('active');
                renderOrders(); // فرض الرسم
                
                if (orders.length > 0) {
                    alert('نجاح! تم إيجاد ' + orders.length + ' طلب وفرضها على الشاشة. إذا رأيتها الآن، فالمشكلة كانت في التحديث التلقائي.');
                } else {
                    alert('الاتصال ناجح، لكن الإكسل فارغ تماماً! تأكد أنك أتممت طلباً من المتجر.');
                }
            } else {
                alert('خطأ في البيانات: ' + text);
            }
        } catch(e) {
            alert('فشل الاتصال: ' + e.message);
        }
    });

    // التحديث العادي
    async function fetchOrders() {
        try {
            let res = await fetch(SCRIPT_URL + '?action=getOrders&t=' + Date.now());
            let data = await res.json();
            if (data.success) {
                orders = data.orders;
                renderOrders();
            }
        } catch(e) { console.error(e); }
    }

    async function markComplete(orderId) {
        let formData = new URLSearchParams();
        formData.append('action', 'updateOrderStatus');
        formData.append('orderId', orderId);
        formData.append('status', 'completed');
        await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        fetchOrders();
    }

    // التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            currentStatus this.dataset.status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderOrders();
        });
    });

    // بدء التشغيل
    fetchOrders();
    setInterval(fetchOrders, 5000);
</script>
</body>
</html>
